services:
  postgres:
    image: postgres:16-alpine
    container_name: gameclub-postgres
    restart: unless-stopped
    env_file:
      - .env.postgres.local
    ports:
      - '55432:5432'
    volumes:
      - gameclub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  gameclub-postgres-data:
